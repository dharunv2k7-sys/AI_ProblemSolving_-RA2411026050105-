<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku CSP Solver</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; padding: 20px; }
        h1 { color: #333; }
        #sudoku-board { display: grid; grid-template-columns: repeat(9, 40px); gap: 2px; margin-bottom: 20px; background-color: #333; padding: 4px; border-radius: 4px; }
        .cell { width: 40px; height: 40px; text-align: center; font-size: 20px; border: none; background-color: white; }
        .cell:nth-child(3n) { margin-right: 2px; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { margin-bottom: 2px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .controls { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h1>Sudoku CSP Solver</h1>
    <div id="sudoku-board"></div>
    <div class="controls">
        <button onclick="solve()">Solve (CSP Backtracking)</button>
        <button onclick="reset()">Reset</button>
    </div>
    <p id="message"></p>

    <script>
        const initialGrid = [
            [3, 0, 6, 5, 0, 8, 4, 0, 0],
            [5, 2, 0, 0, 0, 0, 0, 0, 0],
            [0, 8, 7, 0, 0, 0, 0, 3, 1],
            [0, 0, 3, 0, 1, 0, 0, 8, 0],
            [9, 0, 0, 8, 6, 3, 0, 0, 5],
            [0, 5, 0, 0, 9, 0, 6, 0, 0],
            [1, 3, 0, 0, 0, 0, 2, 5, 0],
            [0, 0, 0, 0, 0, 0, 0, 7, 4],
            [0, 0, 5, 2, 0, 6, 3, 0, 0]
        ];

        let grid = JSON.parse(JSON.stringify(initialGrid));

        function createBoard() {
            const board = document.getElementById('sudoku-board');
            board.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'cell';
                    input.id = `cell-${r}-${c}`;
                    input.min = 1;
                    input.max = 9;
                    if (grid[r][c] !== 0) {
                        input.value = grid[r][c];
                        input.readOnly = true;
                        input.style.backgroundColor = '#e9ecef';
                    }
                    board.appendChild(input);
                }
            }
        }

        function getGridFromUI() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const val = document.getElementById(`cell-${r}-${c}`).value;
                    grid[r][c] = val === '' ? 0 : parseInt(val);
                }
            }
        }

        function updateUI() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (grid[r][c] !== 0) {
                        document.getElementById(`cell-${r}-${c}`).value = grid[r][c];
                    }
                }
            }
        }

        function isValid(grid, row, col, num) {
            for (let x = 0; x <= 8; x++) if (grid[row][x] == num) return false;
            for (let x = 0; x <= 8; x++) if (grid[x][col] == num) return false;
            let startRow = row - row % 3, startCol = col - col % 3;
            for (let i = 0; i < 3; i++)
                for (let j = 0; j < 3; j++)
                    if (grid[i + startRow][j + startCol] == num) return false;
            return true;
        }

        function solveSudoku(grid, row = 0, col = 0) {
            if (row == 9 - 1 && col == 9) return true;
            if (col == 9) { row++; col = 0; }
            if (grid[row][col] != 0) return solveSudoku(grid, row, col + 1);
            for (let num = 1; num < 10; num++) {
                if (isValid(grid, row, col, num)) {
                    grid[row][col] = num;
                    if (solveSudoku(grid, row, col + 1)) return true;
                }
                grid[row][col] = 0;
            }
            return false;
        }

        function solve() {
            getGridFromUI();
            const msg = document.getElementById('message');
            if (solveSudoku(grid)) {
                updateUI();
                msg.textContent = "Sudoku solved successfully using CSP Backtracking!";
                msg.style.color = "green";
            } else {
                msg.textContent = "No solution exists for the given grid.";
                msg.style.color = "red";
            }
        }

        function reset() {
            grid = JSON.parse(JSON.stringify(initialGrid));
            createBoard();
            document.getElementById('message').textContent = "";
        }

        createBoard();
    </script>
</body>
</html>

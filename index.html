<!DOCTYPE html>
<html>
<head>
    <title>AI Problem Solving</title>
    <style>
        body { font-family: Arial; text-align: center; }
        table { margin: auto; border-collapse: collapse; }
        td {
            border: 1px solid black;
            padding: 10px;
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>

<h1>AI Problem Solving System</h1>

<h2>Sudoku Solution</h2>
<table>
    {% for row in sudoku %}
    <tr>
        {% for num in row %}
        <td>{{ num }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

<h2>BFS Path</h2>
<p>{{ path }}</p>

</body>
</html>
